name: Build AOSP 15 for Galaxy M14 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: 1. 深度清理空間 (釋放所有無用緩存與環境)
      run: |
        echo "=== 清理前硬碟狀態 ==="
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        echo "=== 清理後硬碟狀態 ==="
        df -h

    - name: 2. 下載並配置 Google Repo 工具
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. 初始化並下載 Android 15 (極致省空間精簡模式)
      run: |
        git config --global user.name "YourName"
        git config --global user.email "you@example.com"
        cd $GITHUB_WORKSPACE
        
        # 鎖定 Android 15 標準分支，並使用極致省空間三件套 (--depth=1, --no-tags, --no-clone-bundle)
        repo init -u https://android.googlesource.com/platform/manifest -b android-15.0.0_r1 --depth=1 --no-tags --no-clone-bundle
        
        # 強制只抓當前分支 (-c)，強行擠出空間
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: 4. 導入 M14 5G 晶片硬體裝置樹 (對齊 lineage-22.2)
      run: |
        cd $GITHUB_WORKSPACE
        # 這裡精準匹配大神的唯一分支 lineage-22.2
        git clone -b lineage-22.2 --depth=1 https://github.com/devhunter1/android_device_samsung_s5e8535-common.git device/samsung/s5e8535-common

    - name: 5. 點火！編譯 (極致省空間與省記憶體設定)
      run: |
        cd $GITHUB_WORKSPACE
        
        # 關閉快取，用時間換硬碟空間，保證不會塞爆 111G
        export USE_CCACHE=0
        export CCACHE_DISABLE=1
        
        # 載入環境
        source build/envsetup.sh
        
        # 呼叫大神的晶片編譯目標
        lunch aosp_s5e8535_common-userdebug
        
        # 使用 -j4 限制同時執行的核心數，防止虛擬機記憶體崩潰
        make systemimage -j4

    - name: 6. 打包成品
      uses: actions/upload-artifact@v4
      with:
        name: AOSP-15-Galaxy-M14-ROM
        path: |
          out/target/product/*/*.img
          out/target/product/*/*.zip
