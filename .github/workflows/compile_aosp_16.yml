name: Build AOSP 16 for Galaxy M14 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: 1. 安裝 Android 16 編譯必備的現代化套件
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev \
        gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev \
        libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libssl-dev \
        rsync libncursesw5-dev bc tmux libncurses5-dev python3 python3-pip

    - name: 2. 下載並配置 Google Repo 工具
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. 初始化並下載 Android 16 官方主線原始碼
      run: |
        git config --global user.name "YourName"
        git config --global user.email "you@example.com"
        mkdir -p /work/aosp && cd /work/aosp
        repo init -u https://android.googlesource.com/platform/manifest -b android16-release --depth=1
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: 4. 導入 M14 5G 晶片硬體裝置樹（指定 lineage-22.2 分支）
      run: |
        cd /work/aosp
        # 複製你找到的 Exynos 1330 裝置樹，並指定你畫面中的正確分支
        git clone -b lineage-22.2 https://github.com/devhunter1/android_device_samsung_s5e8535-common.git device/samsung/s5e8535-common
        
        # 為 4GB RAM 的 M14 注入 Android 16 低記憶體流暢優化設定檔
        echo "ro.config.low_ram=true" >> device/samsung/s5e8535-common/system.prop
        echo "ro.config.android16_ext_lowram=true" >> device/samsung/s5e8535-common/system.prop

    - name: 5. 點火！全速編譯 M14 5G 專屬 Android 16 系統
      run: |
        cd /work/aosp
        source build/envsetup.sh
        # 載入該晶片組的編譯目標
        lunch aosp_s5e8535_common-userdebug
        mka bacon -j$(nproc)

    - name: 6. 打包成品並傳送至手機
      uses: actions/upload-artifact@v4
      with:
        name: AOSP-16-Galaxy-M14-ROM
        path: /work/aosp/out/target/product/*/*.zip
