name: Build AOSP 16 for Galaxy M14 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: 1. 深度清理空間 (釋放所有無用緩存)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo apt-get clean
        df -h

    - name: 2. 下載並配置 Google Repo 工具
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 3. 初始化並下載 Android 16 (精簡模式)
      run: |
        git config --global user.name "YourName"
        git config --global user.email "you@example.com"
        cd $GITHUB_WORKSPACE
        # 使用 --depth=1 來大幅縮減下載資料量
        repo init -u https://android.googlesource.com/platform/manifest -b android16-release --depth=1
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: 4. 導入 M14 5G 晶片硬體裝置樹
      run: |
        cd $GITHUB_WORKSPACE
        git clone -b lineage-22.2 --depth=1 https://github.com/devhunter1/android_device_samsung_s5e8535-common.git device/samsung/s5e8535-common

    - name: 5. 點火！編譯 (使用較小的編譯目標)
      run: |
        cd $GITHUB_WORKSPACE
        source build/envsetup.sh
        lunch aosp_s5e8535_common-userdebug
        # 使用 -j4 限制同時編譯的執行緒，防止記憶體不足崩潰
        mka bacon -j4

    - name: 6. 打包成品
      uses: actions/upload-artifact@v4
      with:
        name: AOSP-16-Galaxy-M14-ROM
        path: out/target/product/*/*.zip
